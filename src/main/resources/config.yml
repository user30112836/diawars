# TeamZones Plugin Konfiguration
#
# Die Welt wird bei X=0 geteilt:
# - Team A: negative X-Koordinaten (X > 0)
# - Team B: positive X-Koordinaten (X < 0)

lobby:
  world: "lobby"
  spawn-point:
    x: 0
    y: 0
    z: 0
    yaw: 0
    pitch: 0

border:
  enabled: true
  render-distance: 32
  particle-type: "REDSTONE" # REDSTONE, FLAME, GLOW, END_ROD
  color: "YELLOW"
  amount: 1
  density:
    horizontal: 2 # (1=dense, 8=parse)
    vertical: 3 # (1=dense, 8=parse)

pvp-toggle:
  default-enabled: true
  delay-seconds: 300

teams:
  # Team A (Westliche Zone, X > 0)
  team-a:
    display-name: "Team A"
    players:
      - "UUID1"
      - "UUID2"
      - "UUID3"

  # Team B (Östliche Zone, X < 0)
  team-b:
    display-name: "Team B"
    players:
      - "UUID4"
      - "UUID5"
      - "UUID6"

dia-timer:
  yellow: 3000 # 2.5min
  red: 1200 # 1min
  despawn-time: 12000 # default: 6000 ticks = 5min

diamond-limit: 32
diamonds-per-kill: 2

event:
  accept-reward-diamonds: 5

playtime-reward:
  enabled: true
  interval-minutes: 30
  amount: 1

afk:
  threshold-seconds: 300 # 5min

vaults:
  team-a-vault-1:
    world: "world"
    team: "team-a"
    corner1: { x: 10, y: 60, z: 10 }
    corner2: { x: 20, y: 65, z: 20 }
  team-b-vault-1:
    world: "world"
    team: "team-b"
    corner1: { x: -20, y: 60, z: -20 }
    corner2: { x: -10, y: 65, z: -10 }